// Compute cumulative distance + stats
function haversine(a,b){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(b[0]-a[0]), dLon=toRad(b[1]-a[1]);
  const lat1=toRad(a[0]), lat2=toRad(b[0]);
  const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
const cumDist=[0];
for(let i=1;i<TRACK.length;i++) cumDist.push(cumDist[i-1]+haversine(TRACK[i-1],TRACK[i]));
const totalDist=cumDist[cumDist.length-1];
const eles=TRACK.map(p=>p[2]);
let gain=0, loss=0;
for(let i=1;i<eles.length;i++){
  const d=eles[i]-eles[i-1];
  if(d>0) gain+=d; else loss-=d;
}
document.getElementById('dist').textContent=(totalDist/1000).toFixed(2)+' km';
document.getElementById('gain').textContent=Math.round(gain)+' m';
document.getElementById('loss').textContent=Math.round(loss)+' m';

topo.addTo(map);
L.control.layers({'Topo (Kartverket)':topo,'OpenStreetMap':osm,'Satellitt':sat}).addTo(map);

const line=L.polyline(latlngs,{color:'#e63946',weight:4,opacity:0.9}).addTo(map);
map.fitBounds(line.getBounds(),{padding:[30,30]});

L.marker(latlngs[0],{icon:L.divIcon({className:'start-marker'})})
 .addTo(map).bindPopup('<b>Start</b><br>'+TRACK[0][2]+' m');
L.marker(latlngs[latlngs.length-1],{icon:L.divIcon({className:'end-marker'})})
 .addTo(map).bindPopup('<b>End</b><br>'+TRACK[TRACK.length-1][2]+' m');

// Numbered stops (1–23) — derived from low-velocity pause segments in tur1.gpx
// (speed < 0.5 m/s for >= 5 s, neighbors within 30 m merged).
// Index references the TRACK array; popup shows along-track km + elev.
const STOPS = [
  {n: 1, i:  27}, {n: 2, i:  45}, {n: 3, i:  81}, {n: 4, i: 190},
  {n: 5, i: 279}, {n: 6, i: 292}, {n: 7, i: 302}, {n: 8, i: 379},
  {n: 9, i: 438}, {n:10, i: 450}, {n:11, i: 474}, {n:12, i: 497},
  {n:13, i: 563}, {n:14, i: 582}, {n:15, i: 604}, {n:16, i: 621},
  {n:17, i: 639}, {n:18, i: 686}, {n:19, i: 985}, {n:20, i:1063},
  {n:21, i:1088}, {n:22, i:1196}, {n:23, i:1285},
];
STOPS.forEach(s => {
  const p = TRACK[s.i];
  L.marker([p[0], p[1]], {
    icon: L.divIcon({className: 'stop-marker', html: String(s.n)}),
    zIndexOffset: 500,
  }).addTo(map).bindPopup(
    `<b>Stop ${s.n}</b><br>${(cumDist[s.i]/1000).toFixed(2)} km · ${p[2]} m`
  );
});

let hoverMarker=null;

// Elevation profile (SVG)
const svg=document.getElementById('elev-svg');
const W=1000, H=140, padL=40, padR=10, padT=10, padB=22;
svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
const minE=Math.min(...eles), maxE=Math.max(...eles);
const xScale=d=>padL+(d/totalDist)*(W-padL-padR);
const yScale=e=>padT+(1-(e-minE)/(maxE-minE))*(H-padT-padB);
let path='M '+xScale(0)+' '+yScale(eles[0]);
for(let i=1;i<eles.length;i++) path+=' L '+xScale(cumDist[i])+' '+yScale(eles[i]);
const fill=path+` L ${xScale(totalDist)} ${H-padB} L ${padL} ${H-padB} Z`;

svg.innerHTML=`
  <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e63946" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#e63946" stop-opacity="0.05"/>
  </linearGradient></defs>
  <path d="${fill}" fill="url(#g)"/>
  <path d="${path}" fill="none" stroke="#e63946" stroke-width="1.5"/>
  <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#999"/>
  <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="#999"/>
  <text x="6" y="${yScale(maxE)+4}" font-size="10" fill="#555">${maxE} m</text>
  <text x="6" y="${yScale(minE)+4}" font-size="10" fill="#555">${minE} m</text>
  <text x="${padL}" y="${H-6}" font-size="10" fill="#555">0 km</text>
  <text x="${W-padR-30}" y="${H-6}" font-size="10" fill="#555">${(totalDist/1000).toFixed(2)} km</text>
  <line id="cursor" x1="-10" y1="${padT}" x2="-10" y2="${H-padB}" stroke="#1a3a5c" stroke-width="1" stroke-dasharray="3,2"/>
  <text id="cursor-label" x="0" y="0" font-size="11" fill="#1a3a5c" font-weight="600"></text>
`;

const cursor=svg.querySelector('#cursor');
const cursorLabel=svg.querySelector('#cursor-label');

svg.addEventListener('mousemove',e=>{
  const rect=svg.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width)*W;
  const d=((x-padL)/(W-padL-padR))*totalDist;
  if(d<0||d>totalDist) return;
  let idx=0;
  for(let i=0;i<cumDist.length;i++){ if(cumDist[i]>=d){ idx=i; break; } }
  const p=TRACK[idx];
  cursor.setAttribute('x1',x); cursor.setAttribute('x2',x);
  cursorLabel.setAttribute('x',Math.min(x+6,W-100));
  cursorLabel.setAttribute('y',padT+12);
  cursorLabel.textContent=`${(d/1000).toFixed(2)} km · ${p[2]} m`;
  if(hoverMarker) map.removeLayer(hoverMarker);
  hoverMarker=L.marker([p[0],p[1]],{icon:L.divIcon({className:'hover-marker'})}).addTo(map);
});
svg.addEventListener('mouseleave',()=>{
  cursor.setAttribute('x1',-10); cursor.setAttribute('x2',-10);
  cursorLabel.textContent='';
  if(hoverMarker){ map.removeLayer(hoverMarker); hoverMarker=null; }
});
</script>
</body>
</html>
